spring:
  application:
    name: reeva-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reeva}
    username: ${DB_USERNAME:reeva}
    password: ${DB_PASSWORD:reeva}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION:86400000}

storage:
  upload-dir: ${UPLOAD_DIR:./uploads}
  allowed-types: image/jpeg,image/png,image/webp,application/pdf

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.reeva: DEBUG
    org.springframework.security: INFO
