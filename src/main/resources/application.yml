spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: reeva-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reeva}
    username: ${DB_USERNAME:reeva}
    password: ${DB_PASSWORD:reeva}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 60000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION:86400000}

storage:
  provider: ${STORAGE_PROVIDER:local}
  upload-dir: ${UPLOAD_DIR:./uploads}
  allowed-types: image/jpeg,image/png,image/webp,application/pdf
  s3-bucket: ${AWS_S3_BUCKET:reeva-reembolsos}
  s3-region: ${AWS_REGION:}
  s3-endpoint: ${AWS_S3_ENDPOINT:}
  s3-public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
  s3-access-key-id: ${AWS_ACCESS_KEY_ID:}
  s3-secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3-session-token: ${AWS_SESSION_TOKEN:}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5.4-mini}
  max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:900}

ocr:
  traditional:
    enabled: ${TRADITIONAL_OCR_ENABLED:false}
    command: ${TRADITIONAL_OCR_COMMAND:tesseract}
    languages: ${TRADITIONAL_OCR_LANGUAGES:por+eng}
    timeout-seconds: ${TRADITIONAL_OCR_TIMEOUT_SECONDS:20}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.16.*:*,http://172.17.*:*,http://172.18.*:*,http://172.19.*:*,http://172.20.*:*,http://172.21.*:*,http://172.22.*:*,http://172.23.*:*,http://172.24.*:*,http://172.25.*:*,http://172.26.*:*,http://172.27.*:*,http://172.28.*:*,http://172.29.*:*,http://172.30.*:*,http://172.31.*:*}

logging:
  level:
    com.reeva: DEBUG
    org.springframework.security: INFO
